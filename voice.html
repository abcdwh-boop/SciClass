<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 음성 녹음기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
        }
        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .visualizer-bar {
            transition: height 0.05s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">음성 녹음기</h1>
            <p class="text-indigo-100 text-sm mt-1">목소리를 기록하고 관리하세요</p>
        </div>

        <!-- Visualizer Area -->
        <div class="p-8 flex flex-col items-center">
            <div id="visualizer-container" class="h-16 flex items-center justify-center gap-1 mb-6 w-full hidden">
                <!-- Bars will be generated by JS -->
            </div>
            
            <div id="timer" class="text-4xl font-mono text-slate-700 mb-8">00:00</div>

            <!-- Controls -->
            <div class="flex items-center gap-6">
                <button id="record-btn" class="w-20 h-20 bg-red-500 hover:bg-red-600 rounded-full flex items-center justify-center text-white shadow-lg transition-all active:scale-95">
                    <svg id="record-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="6" />
                    </svg>
                </button>
                
                <button id="stop-btn" disabled class="w-16 h-16 bg-slate-200 text-slate-400 rounded-full flex items-center justify-center transition-all cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="currentColor" viewBox="0 0 24 24">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                </button>
            </div>
            
            <p id="status-text" class="mt-4 text-slate-500 font-medium text-sm">대기 중...</p>
        </div>

        <!-- Recording List -->
        <div class="border-t border-slate-100 bg-slate-50 p-6">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">내 녹음 목록</h2>
            <div id="recordings-list" class="space-y-3 max-h-64 overflow-y-auto pr-1">
                <!-- Recorded items will appear here -->
                <p id="empty-msg" class="text-center text-slate-400 py-4 text-sm">저장된 녹음이 없습니다.</p>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let startTime;
        let timerInterval;
        let audioContext;
        let analyser;
        let dataArray;
        let animationId;

        const recordBtn = document.getElementById('record-btn');
        const stopBtn = document.getElementById('stop-btn');
        const timerDisplay = document.getElementById('timer');
        const statusText = document.getElementById('status-text');
        const recordingsList = document.getElementById('recordings-list');
        const emptyMsg = document.getElementById('empty-msg');
        const visualizerContainer = document.getElementById('visualizer-container');

        // Create visualizer bars
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar w-1 bg-indigo-400 rounded-full h-2';
            visualizerContainer.appendChild(bar);
        }
        const bars = document.querySelectorAll('.visualizer-bar');

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                // Audio Visualizer Setup
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 64;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    addRecordingToList(audioUrl);
                    
                    // Stop visualizer
                    cancelAnimationFrame(animationId);
                    visualizerContainer.classList.add('hidden');
                    
                    // Reset UI
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                startTimer();
                updateVisualizer();
                
                // UI States
                recordBtn.classList.add('recording-pulse', 'ring-4', 'ring-red-100');
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                stopBtn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                stopBtn.classList.add('bg-slate-700', 'text-white', 'hover:bg-slate-800');
                statusText.innerText = '녹음 중...';
                statusText.classList.add('text-red-500');
                visualizerContainer.classList.remove('hidden');

            } catch (err) {
                console.error("Mic access denied:", err);
                alert("마이크 접근 권한이 필요합니다.");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            stopTimer();
            
            recordBtn.classList.remove('recording-pulse', 'ring-4', 'ring-red-100');
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            stopBtn.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
            stopBtn.classList.remove('bg-slate-700', 'text-white', 'hover:bg-slate-800');
            statusText.innerText = '녹음 완료';
            statusText.classList.remove('text-red-500');
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const seconds = Math.floor(elapsed / 1000);
                const minutes = Math.floor(seconds / 60);
                const displaySecs = (seconds % 60).toString().padStart(2, '0');
                const displayMins = minutes.toString().padStart(2, '0');
                timerDisplay.innerText = `${displayMins}:${displaySecs}`;
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerDisplay.innerText = '00:00';
        }

        function updateVisualizer() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            bars.forEach((bar, i) => {
                const value = dataArray[i % dataArray.length];
                const height = Math.max(8, (value / 255) * 60);
                bar.style.height = `${height}px`;
            });
            
            animationId = requestAnimationFrame(updateVisualizer);
        }

        function addRecordingToList(url) {
            emptyMsg.classList.add('hidden');
            
            const recordingId = Date.now();
            const dateStr = new Date().toLocaleString('ko-KR', { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });

            const item = document.createElement('div');
            item.className = 'bg-white p-3 rounded-xl border border-slate-200 flex flex-col gap-2 shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300';
            item.id = `recording-${recordingId}`;
            
            item.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-500">${dateStr}</span>
                    <button onclick="deleteRecording(${recordingId})" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                <audio controls class="w-full h-8" src="${url}"></audio>
            `;

            recordingsList.prepend(item);
        }

        function deleteRecording(id) {
            const el = document.getElementById(`recording-${id}`);
            el.classList.add('opacity-0', 'scale-95', 'transition-all', 'duration-300');
            setTimeout(() => {
                el.remove();
                if (recordingsList.children.length === 1 && recordingsList.contains(emptyMsg)) {
                    emptyMsg.classList.remove('hidden');
                } else if (recordingsList.querySelectorAll('div[id^="recording-"]').length === 0) {
                    emptyMsg.classList.remove('hidden');
                }
            }, 300);
        }

        recordBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
