<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: REAL WORLD - Google Sheets Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f5f4; color: #1c1917; }
        .chart-container { position: relative; width: 100%; height: 250px; }
        .rank-common { border-color: #9ca3af; background-color: #f3f4f6; }
        .rank-uncommon { border-color: #22c55e; background-color: #ecfdf5; }
        .rank-rare { border-color: #3b82f6; background-color: #eff6ff; }
        .rank-epic { border-color: #a855f7; background-color: #faf5ff; }
        .rank-legendary { border-color: #eab308; background-color: #fefce8; }
        .btn-press:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-12">

    <div id="status-bar" class="bg-green-600 text-white text-[10px] py-1 text-center font-mono font-bold">
        GOOGLE SHEETS 연동 모드 (로컬 저장소 병행)
    </div>

    <header class="bg-stone-900 text-stone-100 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase">Project: REAL WORLD</h1>
                <p class="text-[10px] text-stone-500 font-mono">SYNCING WITH GOOGLE SHEETS...</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-stone-400 uppercase tracking-widest">Total Energy</div>
                <div class="text-3xl font-black text-yellow-400 leading-none"><span id="total-ge-display">0</span> <span class="text-sm text-white">min</span></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Dashboard Intro -->
        <div class="mb-8 bg-white p-4 rounded-xl border border-stone-200 shadow-sm">
            <p class="text-sm text-stone-600">퀘스트를 완료하면 구글 시트에 실시간으로 기록됩니다. 주말에 시트를 확인하고 정산하세요!</p>
        </div>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-lg font-bold text-stone-800 mb-4">📊 스탯 현황</h3>
                <div class="chart-container">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-lg font-bold text-stone-800 mb-4">📝 최근 활동 로그</h3>
                <div id="activity-log" class="h-[200px] overflow-y-auto space-y-2 text-xs font-mono">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-black text-stone-800 mb-6 border-b-2 border-stone-900 pb-2 flex items-center">
                <span class="mr-2">📜</span> 퀘스트 보드
            </h2>
            <div id="quest-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
        
        <div class="mt-12 text-center">
            <button id="reset-btn" class="text-xs text-stone-400 hover:text-red-500 underline">로컬 데이터 초기화 (시트 데이터는 유지됨)</button>
        </div>
    </main>

    <script>
        // --- 🔴 중요: 여기에 Google Apps Script 배포 URL을 넣으세요 ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/a/macros/sonline20.sen.go.kr/s/AKfycbwwvvAmO9kiEfjkdQ2YnIsOLU5P583mRHVJ1ydF1svvGuQApV7RX2O2aiAU98l3VXL12A/exec"; 

        const quests = [
            { id: 1, name: "잔소리 전 양치/세수", rank: "Common", time: 1, stat: "VIT", icon: "🚿" },
            { id: 2, name: "이부자리 정리", rank: "Common", time: 1, stat: "VIT", icon: "🛏️" },
            { id: 3, name: "쓰레기통 비우기", rank: "Common", time: 1, stat: "VIT", icon: "🗑️" },
            { id: 4, name: "식탁 차리기 돕기", rank: "Uncommon", time: 3, stat: "STR", icon: "🍽️" },
            { id: 5, name: "설거지 보조", rank: "Uncommon", time: 3, stat: "STR", icon: "🧼" },
            { id: 6, name: "내 방 바닥 닦기", rank: "Uncommon", time: 3, stat: "VIT", icon: "🧹" },
            { id: 7, name: "독서 후 생각 로그", rank: "Rare", time: 5, stat: "INT", icon: "📖" },
            { id: 8, name: "일일 공부 완료", rank: "Rare", time: 5, stat: "INT", icon: "✏️" },
            { id: 9, name: "도서관 대출증/도서", rank: "Epic", time: 10, stat: "LUK", icon: "💳" },
            { id: 10, name: "혼자 마트 심부름", rank: "Epic", time: 10, stat: "LUK", icon: "🛒" },
            { id: 11, name: "줄넘기 500개", rank: "Epic", time: 10, stat: "STR", icon: "🏃" },
            { id: 12, name: "셀프 커스텀 미션", rank: "Legendary", time: 15, stat: "LUK", icon: "👑" },
        ];

        let state = JSON.parse(localStorage.getItem('real_world_state')) || {
            totalGE: 0,
            stats: { VIT: 0, INT: 0, STR: 0, LUK: 0 },
            logs: []
        };

        let statsChart;

        function saveState() {
            localStorage.setItem('real_world_state', JSON.stringify(state));
            updateUI();
        }

        async function sendToGoogleSheets(questData) {
            if (!GOOGLE_SCRIPT_URL) {
                console.warn("Google Script URL이 설정되지 않았습니다.");
                return;
            }

            const status = document.getElementById('status-bar');
            status.innerText = "⏳ 시트로 데이터 전송 중...";
            status.className = "bg-blue-600 text-white text-[10px] py-1 text-center font-mono font-bold";

            try {
                // Fetch with no-cors might be needed for simple GAS triggers
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: new Date().toLocaleString('ko-KR'),
                        quest: questData.name,
                        rank: questData.rank,
                        time: questData.time,
                        stat: questData.stat
                    })
                });
                
                status.innerText = "✅ 시트 저장 성공!";
                status.className = "bg-green-600 text-white text-[10px] py-1 text-center font-mono font-bold";
                setTimeout(() => {
                    status.innerText = "GOOGLE SHEETS 연동 모드 (로컬 저장소 병행)";
                    status.className = "bg-stone-800 text-white text-[10px] py-1 text-center font-mono opacity-50";
                }, 2000);
            } catch (error) {
                console.error("Sheet Sync Error:", error);
                status.innerText = "❌ 전송 실패 (콘솔 확인)";
                status.className = "bg-red-600 text-white text-[10px] py-1 text-center font-mono font-bold";
            }
        }

        window.completeQuest = (id) => {
            const quest = quests.find(q => q.id === id);
            state.totalGE += quest.time;
            state.stats[quest.stat]++;
            
            const logEntry = {
                name: quest.name,
                time: quest.time,
                timestamp: new Date().toLocaleTimeString('ko-KR')
            };
            state.logs.unshift(logEntry);
            if (state.logs.length > 20) state.logs.pop();

            saveState();
            sendToGoogleSheets(quest);
        };

        function updateUI() {
            document.getElementById('total-ge-display').innerText = state.totalGE;
            
            // Update Chart
            if (statsChart) {
                statsChart.data.datasets[0].data = [state.stats.VIT, state.stats.INT, state.stats.STR, state.stats.LUK];
                statsChart.update();
            }

            // Update Logs
            const logContainer = document.getElementById('activity-log');
            logContainer.innerHTML = state.logs.map(log => `
                <div class="flex justify-between items-center border-b border-stone-100 pb-1">
                    <span class="text-stone-400">${log.timestamp}</span>
                    <span class="font-bold text-stone-700">${log.name}</span>
                    <span class="text-yellow-600 font-black">+${log.time}</span>
                </div>
            `).join('');
        }

        function init() {
            const grid = document.getElementById('quest-grid');
            quests.forEach(q => {
                const config = {
                    'Common': 'rank-common', 'Uncommon': 'rank-uncommon', 'Rare': 'rank-rare', 'Epic': 'rank-epic', 'Legendary': 'rank-legendary'
                }[q.rank];
                
                const card = document.createElement('div');
                card.className = `border-l-4 ${config} bg-white p-4 rounded-r-xl shadow-sm btn-press cursor-pointer flex justify-between items-center`;
                card.onclick = () => window.completeQuest(q.id);
                card.innerHTML = `
                    <div class="flex gap-3 items-center">
                        <div class="text-2xl">${q.icon}</div>
                        <div>
                            <div class="font-bold text-sm text-stone-800">${q.name}</div>
                            <div class="text-[10px] font-bold uppercase text-stone-400">+${q.time} GE / ${q.stat}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            const ctx = document.getElementById('statsChart').getContext('2d');
            statsChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['VIT', 'INT', 'STR', 'LUK'],
                    datasets: [{
                        label: 'Stats',
                        data: [0, 0, 0, 0],
                        backgroundColor: 'rgba(234, 179, 8, 0.2)',
                        borderColor: '#eab308',
                        pointBackgroundColor: '#eab308'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { r: { suggestedMin: 0, suggestedMax: 10, ticks: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });

            document.getElementById('reset-btn').onclick = () => {
                if(confirm("로컬 대시보드 데이터를 초기화할까요? (시트 데이터는 삭제되지 않습니다)")) {
                    state = { totalGE: 0, stats: { VIT: 0, INT: 0, STR: 0, LUK: 0 }, logs: [] };
                    saveState();
                }
            };

            updateUI();
        }

        init();
    </script>
</body>
</html>
