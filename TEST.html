<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: REAL WORLD - Cloud Sync Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State & Chart Instances (Global for Module Access)
        window.db = db;
        window.appId = appId;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f5f4; color: #1c1917; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 300px; max-height: 400px; }
        @media (min-width: 768px) { .chart-container { height: 350px; } }
        .rank-common { border-color: #9ca3af; background-color: #f3f4f6; }
        .rank-uncommon { border-color: #22c55e; background-color: #ecfdf5; }
        .rank-rare { border-color: #3b82f6; background-color: #eff6ff; }
        .rank-epic { border-color: #a855f7; background-color: #faf5ff; }
        .rank-legendary { border-color: #eab308; background-color: #fefce8; }
        .btn-press:active { transform: scale(0.95); transition: 0.1s; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
    </style>
    <!-- Chosen Palette: Warm Neutral (Stone) with Cloud Sync Indicators -->
    <!-- Application Structure Plan: 
         1. Real-time Sync: Fixed Firestore pathing to adhere to (collection/doc/collection/doc) rules.
         2. Persistence: User progress is saved in a 'player_state' document within the 'public_data' collection.
         3. Detailed Logging: Every action is recorded in the 'activity_log' collection.
         4. Error Handling: Updated segments to ensure even counts (6 segments for specific docs).
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="bg-stone-100 min-h-screen pb-12">

    <!-- Sync Info Bar -->
    <div id="sync-status" class="bg-stone-800 text-white text-[10px] py-1 text-center font-mono opacity-50">
        서버 연결 확인 중...
    </div>

    <header class="bg-stone-900 text-stone-100 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase">Project: REAL WORLD</h1>
                <p id="user-id-display" class="text-[10px] text-stone-500 font-mono">LOADING PLAYER ID...</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-stone-400 uppercase tracking-widest">Total Energy</div>
                <div class="text-3xl font-black text-yellow-400 leading-none"><span id="total-ge-display">0</span> <span class="text-sm text-white">min</span></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Stats & Charts Section -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-lg font-bold text-stone-800 mb-4">📊 실시간 스탯 성장</h3>
                <div class="chart-container">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-lg font-bold text-stone-800 mb-4">⚡ 등급별 에너지 비중</h3>
                <div class="chart-container">
                    <canvas id="geSourceChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Quest Board -->
        <section class="mb-12">
            <h2 class="text-2xl font-black text-stone-800 mb-6 border-b-2 border-stone-900 pb-2 flex items-center">
                <span class="mr-2">📜</span> 퀘스트 보드
            </h2>
            <div id="quest-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Quests Injected by JS -->
            </div>
        </section>

        <!-- Activity Log -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-stone-800">📝 타임라인 로그 (클라우드 저장됨)</h3>
                <button id="reset-btn" class="text-xs text-stone-400 hover:text-red-500 underline">데이터 전체 리셋</button>
            </div>
            <div id="activity-log" class="h-64 overflow-y-auto custom-scroll bg-stone-50 rounded-lg p-4 text-sm font-mono space-y-2 border border-stone-200">
                <!-- Logs from Firestore -->
            </div>
        </section>
    </main>

    <script type="module">
        import { doc, setDoc, getDoc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const quests = [
            { id: 1, name: "잔소리 전 양치/세수", rank: "Common", time: 1, stat: "VIT", icon: "🚿" },
            { id: 2, name: "이부자리 정리", rank: "Common", time: 1, stat: "VIT", icon: "🛏️" },
            { id: 3, name: "쓰레기통 비우기", rank: "Common", time: 1, stat: "VIT", icon: "🗑️" },
            { id: 4, name: "식탁 차리기 돕기", rank: "Uncommon", time: 3, stat: "STR", icon: "🍽️" },
            { id: 5, name: "설거지 보조", rank: "Uncommon", time: 3, stat: "STR", icon: "🧼" },
            { id: 6, name: "내 방 바닥 닦기", rank: "Uncommon", time: 3, stat: "VIT", icon: "🧹" },
            { id: 7, name: "독서 후 생각 로그", rank: "Rare", time: 5, stat: "INT", icon: "📖" },
            { id: 8, name: "일일 공부 완료", rank: "Rare", time: 5, stat: "INT", icon: "✏️" },
            { id: 9, name: "도서관 대출증/도서", rank: "Epic", time: 10, stat: "LUK", icon: "💳" },
            { id: 10, name: "혼자 마트 심부름", rank: "Epic", time: 10, stat: "LUK", icon: "🛒" },
            { id: 11, name: "줄넘기 500개", rank: "Epic", time: 10, stat: "STR", icon: "🏃" },
            { id: 12, name: "셀프 커스텀 미션", rank: "Legendary", time: 15, stat: "LUK", icon: "👑" },
        ];

        const rankConfig = {
            'Common': { color: 'text-stone-600', border: 'rank-common' },
            'Uncommon': { color: 'text-green-600', border: 'rank-uncommon' },
            'Rare': { color: 'text-blue-600', border: 'rank-rare' },
            'Epic': { color: 'text-purple-600', border: 'rank-epic' },
            'Legendary': { color: 'text-yellow-600', border: 'rank-legendary' }
        };

        let statsChart, geChart;
        let currentUser = null;

        // --- FIREBASE AUTH ---
        const initAuth = async () => {
            const auth = getAuth();
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error", error);
                document.getElementById('sync-status').innerText = "❌ 인증 오류 발생";
            }
        };

        onAuthStateChanged(getAuth(), (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-id-display').innerText = `PLAYER ID: ${user.uid}`;
                document.getElementById('sync-status').innerText = "🟢 실시간 동기화 모드 활성";
                setupRealtimeListeners(user.uid);
            }
        });

        // --- REALTIME DATA SYNC ---
        function setupRealtimeListeners(uid) {
            // FIX: Path segments must be even. Using 6 segments: artifacts/{appId}/public/data/{collection}/{docId}
            const stateDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'player_state', 'current_status');
            
            onSnapshot(stateDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    updateUI(data);
                } else {
                    // Initial State Setup
                    setDoc(stateDocRef, { 
                        totalGE: 0, 
                        stats: { VIT: 0, INT: 0, STR: 0, LUK: 0 },
                        questCounts: { Common: 0, Uncommon: 0, Rare: 0, Epic: 0, Legendary: 0 }
                    });
                }
            }, (err) => console.error("State sync err", err));

            // Log collection: artifacts/{appId}/public/data/activity_log
            const logColRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activity_log');
            
            onSnapshot(logColRef, (querySnap) => {
                const logs = [];
                querySnap.forEach(doc => logs.push(doc.data()));
                // Sort by time descending in memory
                logs.sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeB - timeA;
                });
                renderLogs(logs);
            }, (err) => console.error("Log sync err", err));
        }

        // --- ACTIONS ---
        window.completeQuest = async (id) => {
            if (!currentUser) return;
            const quest = quests.find(q => q.id === id);
            
            // Reference even-segment path
            const stateDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'player_state', 'current_status');
            const snap = await getDoc(stateDocRef);
            let currentData = snap.data() || { totalGE: 0, stats: { VIT: 0, INT: 0, STR: 0, LUK: 0 }, questCounts: { Common: 0, Uncommon: 0, Rare: 0, Epic: 0, Legendary: 0 } };

            const updatedData = {
                totalGE: currentData.totalGE + quest.time,
                stats: { 
                    ...currentData.stats, 
                    [quest.stat]: (currentData.stats[quest.stat] || 0) + 1 
                },
                questCounts: { 
                    ...currentData.questCounts, 
                    [quest.rank]: (currentData.questCounts[quest.rank] || 0) + quest.time 
                }
            };

            await setDoc(stateDocRef, updatedData);

            // Add log entry
            const logColRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activity_log');
            await addDoc(logColRef, {
                ...quest,
                timestamp: serverTimestamp(),
                userId: currentUser.uid
            });
        };

        window.resetData = async () => {
            if (!confirm("모든 클라우드 데이터를 초기화할까요?")) return;
            
            const stateDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'player_state', 'current_status');
            await setDoc(stateDocRef, { 
                totalGE: 0, 
                stats: { VIT: 0, INT: 0, STR: 0, LUK: 0 },
                questCounts: { Common: 0, Uncommon: 0, Rare: 0, Epic: 0, Legendary: 0 }
            });

            const logColRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'activity_log');
            const snap = await getDocs(logColRef);
            const deletePromises = [];
            snap.forEach((d) => deletePromises.push(deleteDoc(d.ref)));
            await Promise.all(deletePromises);
        };

        // --- UI & CHARTS ---
        function updateUI(data) {
            if(!data) return;
            document.getElementById('total-ge-display').innerText = data.totalGE || 0;
            
            if (statsChart) {
                statsChart.data.datasets[0].data = [
                    data.stats?.VIT || 0, 
                    data.stats?.INT || 0, 
                    data.stats?.STR || 0, 
                    data.stats?.LUK || 0
                ];
                statsChart.options.scales.r.suggestedMax = Math.max(...Object.values(data.stats || {}), 5) + 2;
                statsChart.update();
            }

            if (geChart) {
                geChart.data.datasets[0].data = [
                    data.questCounts?.Common || 0, 
                    data.questCounts?.Uncommon || 0, 
                    data.questCounts?.Rare || 0, 
                    data.questCounts?.Epic || 0, 
                    data.questCounts?.Legendary || 0
                ];
                geChart.update();
            }
        }

        function renderLogs(logs) {
            const logContainer = document.getElementById('activity-log');
            if (logs.length === 0) {
                logContainer.innerHTML = `<div class="text-center py-20 text-stone-400">데이터를 동기화 중이거나 로그가 없습니다.</div>`;
                return;
            }
            logContainer.innerHTML = logs.map(log => {
                const date = log.timestamp ? new Date(log.timestamp.seconds * 1000).toLocaleString('ko-KR') : '방금 전';
                return `
                    <div class="flex flex-col p-3 bg-white border border-stone-200 rounded-lg shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-stone-400 text-[10px] uppercase font-bold tracking-tight">${date}</span>
                            <span class="px-2 py-0.5 rounded-full text-[9px] font-bold bg-stone-100 text-stone-500">${log.rank}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${log.icon}</span>
                            <span class="font-bold text-stone-800">${log.name}</span>
                            <span class="ml-auto text-yellow-600 font-black">+${log.time} GE</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function initApp() {
            const grid = document.getElementById('quest-grid');
            quests.forEach(q => {
                const config = rankConfig[q.rank];
                const div = document.createElement('div');
                div.className = `border-l-4 ${config.border} bg-white p-4 rounded-r-xl shadow-sm btn-press cursor-pointer flex justify-between items-center`;
                div.onclick = () => window.completeQuest(q.id);
                div.innerHTML = `
                    <div class="flex gap-3 items-center">
                        <div class="text-2xl">${q.icon}</div>
                        <div>
                            <div class="font-bold text-sm text-stone-800">${q.name}</div>
                            <div class="text-[10px] ${config.color} font-bold uppercase">+${q.time} GE</div>
                        </div>
                    </div>
                    <div class="text-stone-300">➔</div>
                `;
                grid.appendChild(div);
            });

            const ctx1 = document.getElementById('statsChart').getContext('2d');
            statsChart = new Chart(ctx1, {
                type: 'radar',
                data: {
                    labels: ['VIT', 'INT', 'STR', 'LUK'],
                    datasets: [{ label: 'Player Stat', data: [0,0,0,0], backgroundColor: 'rgba(234, 179, 8, 0.2)', borderColor: '#eab308' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { r: { suggestedMax: 5, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('geSourceChart').getContext('2d');
            geChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'],
                    datasets: [{ data: [0,0,0,0,0], backgroundColor: ['#d1d5db', '#86efac', '#93c5fd', '#d8b4fe', '#fde047'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });

            document.getElementById('reset-btn').onclick = () => window.resetData();
            
            initAuth();
        }

        initApp();
    </script>
</body>
</html>
